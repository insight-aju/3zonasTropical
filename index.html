<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>3 Zonas Tropical</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f7fb;
      color:#203040;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
      padding:24px;
    }
    .card{
      max-width:700px;
      background:#ffffff;
      border:1px solid #d9e3ee;
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h1{margin-top:0}
    a{
      display:inline-block;
      margin:8px;
      padding:12px 16px;
      border-radius:12px;
      text-decoration:none;
      background:#1f5f99;
      color:#fff;
      font-weight:bold;
    }
    .muted{color:#5f7387}
  </style>
</head>
<body>
  <div class="card">
    <h1>3 Zonas Tropical</h1>
    <p class="muted">Repositório de assets do tema remoto do ESP32.</p>
    <p>
      <a href="./themes/tema-light.css">Abrir CSS do tema light</a>
      <a href="./img/background-light.svg">Abrir background</a>
    </p>
  </div>
</body>
</html>
